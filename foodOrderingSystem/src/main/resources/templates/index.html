<!DOCTYPE html>
<html>
<body>
<h1>Food Menu</h1>
<ul>
    <li th:each="food : ${foodItems}">
        <span th:text="${food.name}"></span> - $<span th:text="${food.price}"></span>
        <form action="/add-to-cart" method="post">
            <input type="hidden" th:value="${food.name}" name="foodName"/>
            <input type="hidden" th:value="${food.price}" name="price"/>
            <button type="submit">Add to Cart</button>
        </form>
    </li>
</ul>
</body>
</html>
