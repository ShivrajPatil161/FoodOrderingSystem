<!DOCTYPE html>
<html>
<body>
<h1>Food Items</h1>
<a href="/food/form">Add New Food</a>
<ul>
    <li th:each="food : ${foodItems}">
        <span th:text="${food.name}"></span> - $<span th:text="${food.price}"></span>
        <a th:href="@{/food/form(id=${food.id})}">Edit</a>
        <a th:href="@{/food/delete(id=${food.id})}">Delete</a>
    </li>
</ul>
</body>
</html>
